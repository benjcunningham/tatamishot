<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TatamiShot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #e5a00d;
      --accent-dim: #a37200;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #e55;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.4;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    /* Session card */
    #session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #session-card .title {
      font-size: 1.05rem;
      font-weight: 600;
    }

    #session-card .meta {
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      gap: 12px;
    }

    #session-card .timestamp {
      font-size: 1.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      cursor: pointer;
      user-select: none;
    }

    #ts-nudge-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #ts-nudge-row.hidden { display: none; }

    .nudge-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 4px 8px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .nudge-btn:active { background: var(--border); }

    #session-ts-wrap {
      flex: 1;
      text-align: center;
    }

    #ts-edit-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 4px 8px;
      text-align: center;
      display: none;
    }

    #ts-edit-input.visible { display: block; }

    #ts-sync-btn {
      display: block;
      width: 100%;
      text-align: center;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      padding: 4px 6px;
      text-decoration: underline;
    }

    #ts-sync-btn.hidden { display: none; }

    #session-card.idle .title { color: var(--muted); }

    /* Capture panel */
    #capture-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    #capture-panel.visible { display: flex; }

    #capture-btn {
      position: relative;
      width: 100%;
      padding: 24px 10px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
      touch-action: none;
    }

    #capture-btn.recording {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    #capture-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    #clip-range {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    #clip-range.hidden { display: none; }

    .mark-ts {
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      border-bottom: 1px dashed var(--border);
    }

    .mark-ts-input {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
      padding: 4px 8px;
      width: 9ch;
      text-align: center;
      display: none;
    }

    .mark-ts-input.visible { display: inline-block; }

    .audio-track-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .audio-track-row.hidden { display: none; }

    .audio-track-row label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      width: 44px;
      flex-shrink: 0;
    }

    .audio-track-row select {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 12px;
    }

    .audio-track-row select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .subtitle-track-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subtitle-track-row.hidden { display: none; }

    .subtitle-track-row label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      width: 44px;
      flex-shrink: 0;
    }

    .subtitle-track-row select {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 12px;
    }

    .subtitle-track-row select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Primary action button */
    .action-btn {
      width: 100%;
      padding: 20px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s;
    }

    .action-btn:active { background: var(--accent-dim); }
    .action-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    .action-btn.hidden { display: none; }

    /* Progress */
    #progress {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px 0;
    }

    #progress.visible { display: flex; }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #progress p { color: var(--muted); font-size: 0.9rem; }

    /* Output */
    #output {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    #output.visible { display: flex; }

    #output img, #output video {
      width: 100%;
      border-radius: var(--radius);
      background: #000;
    }

    #output video { max-height: 60vw; }

    .share-btn {
      width: 100%;
      padding: 20px;
      border-radius: var(--radius);
      border: none;
      background: #1e3a1e;
      border: 2px solid #2e5a2e;
      color: #7ec87e;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .reset-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* Error */
    #error-msg {
      display: none;
      background: #2a0a0a;
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--danger);
      font-size: 0.85rem;
    }

    #error-msg.visible { display: block; }

    /* Refresh indicator */
    #refresh-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    /* Auth banner */
    #auth-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: center;
    }

    #auth-banner.hidden { display: none; }

    #auth-banner p {
      font-size: 0.9rem;
      color: var(--muted);
    }

    #auth-status { min-height: 1.2em; }

    #plex-signin-btn {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    #plex-signin-btn:active { background: var(--accent-dim); }
    #plex-signin-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    #signout-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    #signout-btn.hidden { display: none; }

    /* Trim panel */
    #trim-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    #trim-panel.visible { display: flex; }

    #trim-tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .trim-tab {
      flex: 1;
      padding: 10px;
      background: var(--surface);
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .trim-tab.active { background: var(--border); color: var(--text); }
    .trim-tab[data-tab="in"].active  { border-bottom: 2px solid #4a9eff; }
    .trim-tab[data-tab="out"].active { border-bottom: 2px solid #ff4a4a; }

    #trim-twoUp {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .trim-frame-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid transparent;
    }

    .trim-frame-wrap.border-in  { border-color: #4a9eff; }
    .trim-frame-wrap.border-out { border-color: #ff4a4a; }

    .trim-frame-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .trim-frame-badge {
      position: absolute;
      bottom: 3px; left: 3px;
      background: rgba(0,0,0,0.7);
      border-radius: 3px;
      font-size: 0.6rem;
      color: #fff;
      padding: 1px 4px;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    #trim-nudge-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .trim-nudge-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 8px 12px;
      cursor: pointer;
    }

    .trim-nudge-btn:active { background: var(--border); }

    #trim-frame-tc {
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      min-width: 80px;
      text-align: center;
    }

  </style>
</head>
<body>
<div id="app">
  <header>
    <div id="refresh-dot"></div>
    <h1>TatamiShot</h1>
    <button id="signout-btn" class="hidden">Sign out</button>
  </header>

  <div id="auth-banner" class="hidden">
    <p>Sign in to your Plex account to use TatamiShot.</p>
    <button id="plex-signin-btn">Sign in with Plex</button>
    <p id="auth-status"></p>
  </div>

  <div id="session-card" class="idle">
    <div class="title" id="session-title">Waiting for Plex…</div>
    <div class="meta">
      <span id="session-year"></span>
    </div>
    <div id="ts-nudge-row" class="hidden">
      <button class="nudge-btn" data-nudge="-5">−5s</button>
      <button class="nudge-btn" data-nudge="-1">−1s</button>
      <div id="session-ts-wrap">
        <div class="timestamp" id="session-ts">–:––:––</div>
        <input type="text" id="ts-edit-input" placeholder="h:mm:ss" />
      </div>
      <button class="nudge-btn" data-nudge="1">+1s</button>
      <button class="nudge-btn" data-nudge="5">+5s</button>
    </div>
    <button id="ts-sync-btn" class="hidden">resync with plex</button>
  </div>

  <div id="capture-panel">
    <button id="capture-btn" disabled>
      <span id="capture-btn-label">Tap for Frame · Hold for Clip</span>
    </button>
    <div id="audio-track-row" class="audio-track-row hidden">
      <label for="audio-track-select">Audio</label>
      <select id="audio-track-select"></select>
    </div>
    <div id="subtitle-track-row" class="subtitle-track-row hidden">
      <label for="subtitle-track-select">Subs</label>
      <select id="subtitle-track-select"></select>
    </div>
    <label id="fast-toggle">
      <input type="checkbox" id="fast-mode" checked />
      Fast mode (keyframe-accurate, instant)
    </label>
    <div id="clip-range" class="hidden">
      <span id="mark-in-display" class="mark-ts"></span>
      <input type="text" id="mark-in-input" class="mark-ts-input" placeholder="h:mm:ss" />
      <span>→</span>
      <span id="mark-out-display" class="mark-ts"></span>
      <input type="text" id="mark-out-input" class="mark-ts-input" placeholder="h:mm:ss" />
      <span id="clip-duration"></span>
    </div>
    <button class="action-btn hidden" id="capture-clip-btn" disabled>Export Clip</button>
  </div>

  <!-- Trim panel -->
  <div id="trim-panel">
    <div id="trim-twoUp">
      <div class="trim-frame-wrap border-in" id="trim-frame-in-wrap">
        <img id="trim-frame-in" alt="" />
        <div class="trim-frame-badge" id="trim-frame-in-badge"></div>
      </div>
      <div class="trim-frame-wrap border-out" id="trim-frame-out-wrap">
        <img id="trim-frame-out" alt="" />
        <div class="trim-frame-badge" id="trim-frame-out-badge"></div>
      </div>
    </div>
    <div id="trim-tabs">
      <button class="trim-tab active" data-tab="in">Start frame</button>
      <button class="trim-tab" data-tab="out">End frame</button>
    </div>
    <div id="trim-nudge-row">
      <button class="trim-nudge-btn" data-nudge="-10">−10f</button>
      <button class="trim-nudge-btn" data-nudge="-1">−1f</button>
      <span id="trim-frame-tc"></span>
      <button class="trim-nudge-btn" data-nudge="1">+1f</button>
      <button class="trim-nudge-btn" data-nudge="10">+10f</button>
    </div>
  </div>

  <!-- Progress -->
  <div id="progress">
    <div class="spinner"></div>
    <p id="progress-msg">Processing…</p>
  </div>

  <!-- Error -->
  <div id="error-msg" id="error-display"></div>

  <!-- Output -->
  <div id="output">
    <div id="output-media"></div>
    <button class="share-btn" id="share-btn">⬆ Save / Share</button>
    <button class="reset-btn" id="reset-btn">Start Over</button>
  </div>
</div>

<script>
(() => {
  // -------------------------------------------------------------------------
  // State
  // -------------------------------------------------------------------------
  let session = null;       // current plex session data
  let notPlayingCount = 0;  // consecutive empty-session responses from Plex
  let markIn = null;        // seconds
  let markOut = null;       // seconds
  let outputUrl = null;     // blob URL of final output
  let outputFilename = null;
  let pollTimer = null;
  let sessionFetchedAt = null;  // Date.now() at last successful Plex poll
  let sessionBaseTs = null;     // session.timestamp at last successful Plex poll
  let userOffset = 0;           // seconds manually nudged by user
  let currentRatingKey = null;  // ratingKey of last seen title (resets offset on change)
  let pinPollTimer = null;
  let fps = 24.0;
  let sourceDuration = 0;
  let activeTab = 'in';
  let frameCache = new Map();
  let twoUpController = null;
  let twoUpDebounceTimer = null;

  // -------------------------------------------------------------------------
  // DOM refs
  // -------------------------------------------------------------------------
  const authBanner    = document.getElementById('auth-banner');
  const plexSigninBtn = document.getElementById('plex-signin-btn');
  const authStatus    = document.getElementById('auth-status');
  const signoutBtn    = document.getElementById('signout-btn');
  const sessionCard  = document.getElementById('session-card');
  const sessionTitle = document.getElementById('session-title');
  const sessionYear  = document.getElementById('session-year');
  const sessionTs    = document.getElementById('session-ts');
  const tsNudgeRow   = document.getElementById('ts-nudge-row');
  const tsEditInput  = document.getElementById('ts-edit-input');
  const tsSyncBtn    = document.getElementById('ts-sync-btn');
  const capturePanel  = document.getElementById('capture-panel');
  const captureBtn    = document.getElementById('capture-btn');
  const captureBtnLbl = document.getElementById('capture-btn-label');
  const markInDisplay  = document.getElementById('mark-in-display');
  const markInInput    = document.getElementById('mark-in-input');
  const markOutDisplay = document.getElementById('mark-out-display');
  const markOutInput   = document.getElementById('mark-out-input');
  const clipRange      = document.getElementById('clip-range');
  const clipDuration   = document.getElementById('clip-duration');
  const fastMode     = document.getElementById('fast-mode');
  const captureClipBtn  = document.getElementById('capture-clip-btn');
  const audioTrackRow   = document.getElementById('audio-track-row');
  const audioTrackSelect = document.getElementById('audio-track-select');
  const subtitleTrackRow = document.getElementById('subtitle-track-row');
  const subtitleTrackSelect = document.getElementById('subtitle-track-select');
  const progressEl   = document.getElementById('progress');
  const progressMsg  = document.getElementById('progress-msg');
  const errorEl      = document.getElementById('error-msg');
  const outputEl     = document.getElementById('output');
  const outputMedia  = document.getElementById('output-media');
  const shareBtn     = document.getElementById('share-btn');
  const resetBtn     = document.getElementById('reset-btn');

  const trimPanel        = document.getElementById('trim-panel');
  const trimTabs         = document.querySelectorAll('.trim-tab');
  const trimFrameIn      = document.getElementById('trim-frame-in');
  const trimFrameOut     = document.getElementById('trim-frame-out');
  const trimFrameInBadge  = document.getElementById('trim-frame-in-badge');
  const trimFrameOutBadge = document.getElementById('trim-frame-out-badge');
  const trimFrameTc      = document.getElementById('trim-frame-tc');
  const trimNudgeBtns    = document.querySelectorAll('.trim-nudge-btn');

  // -------------------------------------------------------------------------
  // Auth
  // -------------------------------------------------------------------------
  function getToken() { return localStorage.getItem('plexToken'); }
  function storeToken(t) { localStorage.setItem('plexToken', t); }
  function clearToken() { localStorage.removeItem('plexToken'); }

  function showAuthBanner() {
    authBanner.classList.remove('hidden');
    signoutBtn.classList.add('hidden');
    authStatus.textContent = '';
    plexSigninBtn.disabled = false;
  }

  function hideAuthBanner() {
    authBanner.classList.add('hidden');
    signoutBtn.classList.remove('hidden');
  }

  async function startPlexLogin() {
    plexSigninBtn.disabled = true;
    authStatus.textContent = 'Requesting PIN…';

    try {
      const res = await fetch('/auth/pin', { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { pin_id, auth_url } = await res.json();

      authStatus.textContent = 'Opening Plex sign-in…';
      window.open(auth_url, '_blank', 'width=800,height=700,noopener');
      authStatus.textContent = 'Waiting for authorization…';

      let elapsed = 0;
      pinPollTimer = setInterval(async () => {
        elapsed += 1500;
        if (elapsed >= 4 * 60 * 1000) {
          clearInterval(pinPollTimer);
          plexSigninBtn.disabled = false;
          authStatus.textContent = 'Sign-in timed out. Please try again.';
          return;
        }
        try {
          const pollRes = await fetch(`/auth/pin/${pin_id}`);
          if (!pollRes.ok) return;
          const { auth_token } = await pollRes.json();
          if (auth_token) {
            clearInterval(pinPollTimer);
            storeToken(auth_token);
            hideAuthBanner();
            refreshSession();
          }
        } catch (_) { /* keep polling */ }
      }, 1500);
    } catch (e) {
      plexSigninBtn.disabled = false;
      authStatus.textContent = `Error: ${e.message}`;
    }
  }

  plexSigninBtn.addEventListener('click', startPlexLogin);

  signoutBtn.addEventListener('click', () => {
    clearToken();
    if (pinPollTimer) { clearInterval(pinPollTimer); pinPollTimer = null; }
    session = null;
    renderSession({ playing: false });
    showAuthBanner();
  });

  // -------------------------------------------------------------------------
  // Helpers
  // -------------------------------------------------------------------------
  function fmtTime(secs) {
    if (secs == null || isNaN(secs)) return '–:––:––';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function parseHms(str) {
    if (str == null) return NaN;
    const parts = String(str).trim().split(':').map(Number);
    if (parts.some(isNaN)) return NaN;
    if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    if (parts.length === 2) return parts[0] * 60 + parts[1];
    if (parts.length === 1) return parts[0];
    return NaN;
  }

  function currentTimestamp() {
    if (sessionBaseTs == null || sessionFetchedAt == null) return session?.timestamp ?? null;
    return sessionBaseTs + (Date.now() - sessionFetchedAt) / 1000 + userOffset;
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('visible');
  }

  function clearError() {
    errorEl.textContent = '';
    errorEl.classList.remove('visible');
  }

  function showProgress(msg) {
    progressEl.classList.add('visible');
    progressMsg.textContent = msg || 'Processing…';
    outputEl.classList.remove('visible');
    clearError();
  }

  function hideProgress() {
    progressEl.classList.remove('visible');
  }

  // -------------------------------------------------------------------------
  // Session polling
  // -------------------------------------------------------------------------
  async function refreshSession() {
    const token = getToken();
    if (!token) { showAuthBanner(); return; }
    try {
      const res = await fetch('/session', { headers: { 'X-Plex-Token': token } });
      if (res.status === 401) { clearToken(); showAuthBanner(); return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      session = data;
      if (data.playing && data.timestamp != null) {
        notPlayingCount = 0;
        const titleChanged = data.ratingKey && data.ratingKey !== currentRatingKey;
        if (titleChanged) {
          userOffset = 0;
          currentRatingKey = data.ratingKey;
        }
        if (userOffset === 0) {
          sessionFetchedAt = Date.now();
          sessionBaseTs = data.timestamp;
        }
      } else {
        notPlayingCount += 1;
        if (notPlayingCount < 3) return;
        sessionFetchedAt = null;
        sessionBaseTs = null;
      }
      renderSession(data);
    } catch (e) {
      console.warn('Session fetch failed:', e);
    }
  }

  function renderSession(data) {
    if (!data.playing) {
      sessionCard.classList.add('idle');
      sessionTitle.textContent = 'Nothing playing in Plex';
      sessionYear.textContent = '';
      tsNudgeRow.classList.add('hidden');
      tsSyncBtn.classList.add('hidden');
      captureBtn.disabled = true;
      capturePanel.classList.remove('visible');
      audioTrackRow.classList.add('hidden');
      subtitleTrackRow.classList.add('hidden');
      return;
    }
    sessionCard.classList.remove('idle');
    tsNudgeRow.classList.remove('hidden');
    tsSyncBtn.classList.remove('hidden');
    captureBtn.disabled = false;
    capturePanel.classList.add('visible');
    const displayTitle = data.grandparent_title
      ? `${data.grandparent_title} – ${data.title}`
      : data.title;
    sessionTitle.textContent = displayTitle;
    sessionYear.textContent = data.year ?? '';

    const streams = data.audio_streams ?? [];
    audioTrackRow.classList.toggle('hidden', streams.length < 2);
    if (streams.length >= 2) {
      const currentVal = audioTrackSelect.value;
      audioTrackSelect.innerHTML = '';
      for (const s of streams) {
        const opt = document.createElement('option');
        opt.value = s.index;
        opt.textContent = s.label;
        if (s.selected) opt.selected = true;
        audioTrackSelect.appendChild(opt);
      }
      if (currentVal && streams.some(s => String(s.index) === currentVal)) {
        audioTrackSelect.value = currentVal;
      }
    }

    function buildSubtitleSelect(selectEl, rowEl, subs, defaultIndex) {
      const burnableSubs = subs.filter(s => s.burnable);
      rowEl.classList.toggle('hidden', burnableSubs.length === 0);
      if (burnableSubs.length === 0) return;
      const currentVal = selectEl.value;
      selectEl.innerHTML = '';
      const noneOpt = document.createElement('option');
      noneOpt.value = '';
      noneOpt.textContent = 'None';
      selectEl.appendChild(noneOpt);
      for (const s of burnableSubs) {
        const opt = document.createElement('option');
        opt.value = s.index;
        opt.textContent = s.label;
        if (s.index === defaultIndex) opt.selected = true;
        selectEl.appendChild(opt);
      }
      if (currentVal && burnableSubs.some(s => String(s.index) === currentVal)) {
        selectEl.value = currentVal;
      }
    }

    const subs = data.subtitle_streams ?? [];
    buildSubtitleSelect(subtitleTrackSelect, subtitleTrackRow, subs, data.subtitle_stream_index ?? null);

    fps = data.fps ?? 24.0;
    sourceDuration = data.duration ?? 0;
  }

  function tickTimestamp() {
    if (session?.playing) {
      sessionTs.textContent = fmtTime(currentTimestamp());
    }
  }

  document.querySelectorAll('.nudge-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!session?.playing) return;
      userOffset += parseFloat(btn.dataset.nudge);
      tickTimestamp();
    });
  });

  sessionTs.addEventListener('click', () => {
    if (!session?.playing) return;
    tsEditInput.value = fmtTime(currentTimestamp());
    sessionTs.style.display = 'none';
    tsEditInput.classList.add('visible');
    tsEditInput.focus();
    tsEditInput.select();
  });

  function commitTsEdit() {
    const v = parseHms(tsEditInput.value);
    if (!isNaN(v) && v >= 0) {
      userOffset = v - (sessionBaseTs + (Date.now() - sessionFetchedAt) / 1000);
    }
    tsEditInput.classList.remove('visible');
    sessionTs.style.display = '';
    tickTimestamp();
  }

  tsEditInput.addEventListener('blur', commitTsEdit);
  tsEditInput.addEventListener('keydown', e => { if (e.key === 'Enter') tsEditInput.blur(); });

  tsSyncBtn.addEventListener('click', () => {
    userOffset = 0;
    refreshSession();
  });

  function updateClipState() {
    markInDisplay.textContent  = markIn  !== null ? fmtTime(markIn)  : '–:––:––';
    markOutDisplay.textContent = markOut !== null ? fmtTime(markOut) : '–:––:––';

    const hasAny = markIn !== null || markOut !== null;
    clipRange.classList.toggle('hidden', !hasAny);

    if (markIn !== null && markOut !== null && markOut > markIn) {
      const dur = markOut - markIn;
      clipDuration.textContent = `(${Math.round(dur)}s)`;
      captureClipBtn.disabled = false;
      captureClipBtn.classList.remove('hidden');
    } else if (markIn !== null && markOut !== null) {
      clipDuration.textContent = 'Mark Out must be after Mark In';
      captureClipBtn.disabled = true;
      captureClipBtn.classList.remove('hidden');
    } else {
      clipDuration.textContent = '';
      captureClipBtn.disabled = true;
      captureClipBtn.classList.add('hidden');
    }
    updateTrimPanel();
  }

  function makeMarkEditable(displayEl, inputEl, getValue, setValue) {
    displayEl.addEventListener('click', () => {
      inputEl.value = displayEl.textContent;
      displayEl.style.display = 'none';
      inputEl.classList.add('visible');
      inputEl.focus();
      inputEl.select();
    });

    function commit() {
      const v = parseHms(inputEl.value);
      if (!isNaN(v) && v >= 0) setValue(v);
      inputEl.classList.remove('visible');
      displayEl.style.display = '';
      updateClipState();
    }

    inputEl.addEventListener('blur', commit);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') inputEl.blur(); });
  }

  makeMarkEditable(markInDisplay,  markInInput,  () => markIn,  v => { markIn  = v; });
  makeMarkEditable(markOutDisplay, markOutInput, () => markOut, v => { markOut = v; });

  let holdTimer = null;
  let recordingTick = null;
  let pressStartTs = null;
  let pressStartWall = null;

  captureBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const ts = currentTimestamp();
    if (ts == null) return;
    captureBtn.setPointerCapture(e.pointerId);
    pressStartTs = ts;
    pressStartWall = Date.now();
    captureBtn.classList.add('recording');
    holdTimer = setTimeout(() => {
      holdTimer = null;
      markIn = pressStartTs;
      markOut = null;
      updateClipState();
      recordingTick = setInterval(() => {
        const dur = ((Date.now() - pressStartWall) / 1000).toFixed(1);
        captureBtnLbl.textContent = `● Recording… (${dur}s)`;
      }, 100);
    }, 500);
  });

  function finishPress() {
    if (recordingTick !== null) {
      clearInterval(recordingTick);
      recordingTick = null;
    }
    if (holdTimer !== null) {
      clearTimeout(holdTimer);
      holdTimer = null;
      captureBtn.classList.remove('recording');
      captureFrame(pressStartTs);
    } else if (captureBtn.classList.contains('recording')) {
      captureBtn.classList.remove('recording');
      captureBtnLbl.textContent = 'Tap for Frame · Hold for Clip';
      const ts = currentTimestamp();
      if (ts != null) {
        markOut = ts;
        updateClipState();
      }
    }
    pressStartTs = null;
    pressStartWall = null;
  }

  captureBtn.addEventListener('pointerup', finishPress);
  captureBtn.addEventListener('pointercancel', finishPress);

  // -------------------------------------------------------------------------
  // Frame capture
  // -------------------------------------------------------------------------
  async function captureFrame(ts) {
    if (!session?.file_path) return showError('No active session file path.');
    clearError();
    showProgress('Extracting frame…');
    captureBtn.disabled = true;

    try {
      const res = await fetch('/frame', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          file_path: session.file_path,
          timestamp: ts,
          subtitle_stream_index: subtitleTrackSelect.value !== '' ? parseInt(subtitleTrackSelect.value, 10) : null,
          subtitle_offset: session?.subtitle_offset ?? 0,
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      const blob = await res.blob();
      showOutput(blob, 'frame.jpg', 'image');
    } catch (e) {
      showError(`Frame capture failed: ${e.message}`);
    } finally {
      hideProgress();
      captureBtn.disabled = false;
    }
  }

  // -------------------------------------------------------------------------
  // Clip capture
  // -------------------------------------------------------------------------
  captureClipBtn.addEventListener('click', async () => {
    if (!session?.file_path) return showError('No active session file path.');
    if (markIn === null || markOut === null || markOut <= markIn) return;
    clearError();
    showProgress('Queuing clip…');
    captureClipBtn.disabled = true;

    try {
      const res = await fetch('/clip', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          file_path: session.file_path,
          start: markIn,
          end: markOut,
          fast: fastMode.checked,
          audio_stream_index: audioTrackRow.classList.contains('hidden')
            ? (session?.audio_stream_index ?? null)
            : (audioTrackSelect.value !== '' ? parseInt(audioTrackSelect.value, 10) : null),
          subtitle_stream_index: subtitleTrackSelect.value !== '' ? parseInt(subtitleTrackSelect.value, 10) : null,
          subtitle_offset: session?.subtitle_offset ?? 0,
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      const { job_id } = await res.json();
      pollJob(job_id);
    } catch (e) {
      showError(`Clip request failed: ${e.message}`);
      hideProgress();
      captureClipBtn.disabled = false;
    }
  });

  // -------------------------------------------------------------------------
  // Job polling
  // -------------------------------------------------------------------------
  function pollJob(jobId) {
    progressMsg.textContent = 'Running ffmpeg…';
    clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`/jobs/${jobId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const job = await res.json();

        if (job.status === 'done') {
          clearInterval(pollTimer);
          // Fetch the output file
          const fileRes = await fetch(`/output/${jobId}`);
          if (!fileRes.ok) throw new Error('Failed to download output');
          const blob = await fileRes.blob();
          showOutput(blob, job.filename || `${jobId}.mp4`, 'video');
          hideProgress();
          captureClipBtn.disabled = false;
        } else if (job.status === 'error') {
          clearInterval(pollTimer);
          hideProgress();
          showError(`ffmpeg error: ${job.error || 'unknown'}`);
          captureClipBtn.disabled = false;
        }
      } catch (e) {
        clearInterval(pollTimer);
        hideProgress();
        showError(`Polling failed: ${e.message}`);
        captureClipBtn.disabled = false;
      }
    }, 1500);
  }

  // -------------------------------------------------------------------------
  // Output display
  // -------------------------------------------------------------------------
  function showOutput(blob, filename, type) {
    if (outputUrl) URL.revokeObjectURL(outputUrl);
    outputUrl = URL.createObjectURL(blob);
    outputFilename = filename;

    outputMedia.innerHTML = '';
    if (type === 'image') {
      const img = document.createElement('img');
      img.src = outputUrl;
      img.alt = 'Captured frame';
      outputMedia.appendChild(img);
    } else {
      const video = document.createElement('video');
      video.src = outputUrl;
      video.controls = true;
      video.autoplay = true;
      video.loop = true;
      video.playsInline = true;
      outputMedia.appendChild(video);
    }
    outputEl.classList.add('visible');
  }

  // -------------------------------------------------------------------------
  // Share / Save
  // -------------------------------------------------------------------------
  shareBtn.addEventListener('click', async () => {
    if (!outputUrl) return;
    const res = await fetch(outputUrl);
    const blob = await res.blob();
    const file = new File([blob], outputFilename, { type: blob.type });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'TatamiShot' });
        return;
      } catch (e) {
        if (e.name !== 'AbortError') console.warn('Share failed:', e);
      }
    }
    // Fallback: plain download
    const a = document.createElement('a');
    a.href = outputUrl;
    a.download = outputFilename;
    a.click();
  });

  // -------------------------------------------------------------------------
  // Reset
  // -------------------------------------------------------------------------
  resetBtn.addEventListener('click', () => {
    if (outputUrl) { URL.revokeObjectURL(outputUrl); outputUrl = null; }
    outputEl.classList.remove('visible');
    outputMedia.innerHTML = '';
    clearError();
    if (holdTimer !== null) { clearTimeout(holdTimer); holdTimer = null; }
    if (recordingTick !== null) { clearInterval(recordingTick); recordingTick = null; }
    markIn = null;
    markOut = null;
    pressStartTs = null;
    pressStartWall = null;
    captureBtn.classList.remove('recording');
    captureBtnLbl.textContent = 'Tap for Frame · Hold for Clip';
    for (const url of frameCache.values()) URL.revokeObjectURL(url);
    frameCache.clear();
    updateClipState();
  });

  // -------------------------------------------------------------------------
  // Trim panel
  // -------------------------------------------------------------------------
  function snapToFrame(ts) {
    return Math.round(ts * fps) / fps;
  }

  function fmtFrame(ts) {
    return `f${Math.round(ts * fps)}`;
  }

  async function fetchFrameCached(filePath, ts) {
    const key = `${filePath}:${ts.toFixed(4)}`;
    if (frameCache.has(key)) return frameCache.get(key);
    const token = getToken();
    const res = await fetch('/frame', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Plex-Token': token },
      body: JSON.stringify({ file_path: filePath, timestamp: ts }),
    });
    if (!res.ok) throw new Error(`frame fetch failed: ${res.status}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    frameCache.set(key, url);
    return url;
  }

  function updateTrimPanel() {
    const hasClip = markIn !== null && markOut !== null && markOut > markIn;
    trimPanel.classList.toggle('visible', hasClip);
    if (!hasClip) return;
    updateTrimFrameTc();
    scheduleTwoUp();
  }

  function updateTrimFrameTc() {
    const activeTs = activeTab === 'in' ? markIn : markOut;
    if (activeTs !== null) trimFrameTc.textContent = fmtTime(activeTs);
  }

  function scheduleTwoUp() {
    clearTimeout(twoUpDebounceTimer);
    twoUpDebounceTimer = setTimeout(renderTwoUp, 1500);
  }

  function renderTwoUp() {
    const fp = session?.file_path;
    if (!fp || markIn === null || markOut === null) return;

    trimFrameInBadge.textContent  = `${fmtTime(markIn)}  ${fmtFrame(markIn)}`;
    trimFrameOutBadge.textContent = `${fmtTime(markOut)}  ${fmtFrame(markOut)}`;

    if (twoUpController) twoUpController.abort();
    twoUpController = new AbortController();
    const signal = twoUpController.signal;

    trimFrameIn.src  = '';
    trimFrameOut.src = '';

    fetchFrameCached(fp, markIn).then(url => {
      if (!signal.aborted) trimFrameIn.src = url;
    }).catch(() => {});

    fetchFrameCached(fp, markOut).then(url => {
      if (!signal.aborted) trimFrameOut.src = url;
    }).catch(() => {});
  }

  function nudgeActivePoint(frames) {
    const delta = frames / fps;
    if (activeTab === 'in') {
      markIn = snapToFrame(Math.max(0, (markIn ?? 0) + delta));
      if (markOut !== null && markIn >= markOut) markIn = snapToFrame(markOut - 1 / fps);
    } else {
      markOut = snapToFrame(Math.max(0, (markOut ?? 0) + delta));
      const maxTs = sourceDuration > 0 ? sourceDuration : markOut + 1;
      if (markOut > maxTs) markOut = snapToFrame(maxTs);
      if (markIn !== null && markOut <= markIn) markOut = snapToFrame(markIn + 1 / fps);
    }
    updateClipState();
  }

  trimNudgeBtns.forEach(btn => {
    btn.addEventListener('click', () => nudgeActivePoint(parseInt(btn.dataset.nudge, 10)));
  });

  trimTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      trimTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      updateTrimFrameTc();
    });
  });

  // -------------------------------------------------------------------------
  // Boot
  // -------------------------------------------------------------------------
  if (getToken()) {
    hideAuthBanner();
    refreshSession();
  } else {
    showAuthBanner();
  }
  setInterval(refreshSession, 10000);
  setInterval(tickTimestamp, 1000);
})();
</script>
</body>
</html>
