name: Build & Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - uses: snok/install-poetry@v1
        with:
          version: latest

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint
