name: Version Bump

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  version-check:
    name: Check pyproject.toml exists
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          if [ -f "pyproject.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  version-bump:
    name: Automated version bumper
    runs-on: ubuntu-latest
    needs: check
    if: |
      github.event.pull_request.head.repo.fork != true &&
      github.event.pull_request.head.commit.author.name != 'GitHub Action' &&
      needs.check.outputs.exists == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get PR information
        id: pr_info
        env:
          PR_NUMBER: ${{ github.event.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "head_ref=$HEAD_REF" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr_info.outputs.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: snok/install-poetry@v1

      - name: Check version
        id: version_check
        run: |
          git fetch origin main
          if ! git cat-file -e origin/main:pyproject.toml 2>/dev/null; then
            echo "should_bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git show origin/main:pyproject.toml > main_pyproject.toml

          CURRENT_VERSION=$(awk '/^\[project\]/{flag=1} flag && /^version =/{print; flag=0}' pyproject.toml | sed -E 's/version = "([^"]*)"/\1/')
          PREVIOUS_VERSION=$(awk '/^\[project\]/{flag=1} flag && /^version =/{print; flag=0}' main_pyproject.toml | sed -E 's/version = "([^"]*)"/\1/')

          IFS='.' read -r CURRENT_MAJOR CURRENT_MINOR CURRENT_PATCH <<< "${CURRENT_VERSION%%[-+]*}"
          IFS='.' read -r PREVIOUS_MAJOR PREVIOUS_MINOR PREVIOUS_PATCH <<< "${PREVIOUS_VERSION%%[-+]*}"
          CURRENT_MAJOR=${CURRENT_MAJOR:-0}; CURRENT_MINOR=${CURRENT_MINOR:-0}; CURRENT_PATCH=${CURRENT_PATCH:-0}
          PREVIOUS_MAJOR=${PREVIOUS_MAJOR:-0}; PREVIOUS_MINOR=${PREVIOUS_MINOR:-0}; PREVIOUS_PATCH=${PREVIOUS_PATCH:-0}

          if [[ $CURRENT_MAJOR -gt $PREVIOUS_MAJOR ]] || \
             [[ $CURRENT_MAJOR -eq $PREVIOUS_MAJOR && $CURRENT_MINOR -gt $PREVIOUS_MINOR ]] || \
             [[ $CURRENT_MAJOR -eq $PREVIOUS_MAJOR && $CURRENT_MINOR -eq $PREVIOUS_MINOR && $CURRENT_PATCH -gt $PREVIOUS_PATCH ]]; then
            echo "should_bump=false" >> $GITHUB_OUTPUT
            echo "- $PREVIOUS_VERSION → $CURRENT_VERSION (already bumped)" >> $GITHUB_STEP_SUMMARY
          else
            echo "should_bump=true" >> $GITHUB_OUTPUT
            echo "- $PREVIOUS_VERSION = $CURRENT_VERSION (bump needed)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Bump version
        id: bump
        if: steps.version_check.outputs.should_bump == 'true'
        run: |
          poetry version patch
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add pyproject.toml
          git commit -m "chore: auto-bump version to fix version_check"
          SHA=$(git rev-parse HEAD)
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          git push origin HEAD:refs/heads/${{ steps.pr_info.outputs.head_ref }}
          echo "- bumped to $(poetry version --short) at $SHA_SHORT" >> $GITHUB_STEP_SUMMARY
